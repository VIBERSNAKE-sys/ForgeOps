<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    line-height: 1.6;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }
  .page { width: 100%; max-width: {{PAGE_WIDTH}}; margin: 0 auto; padding: 0; }

  /* === HEADER (matches CV) === */
  .header { margin-bottom: 20px; }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 8px;
  }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: #555;
  }
  .contact-row a { color: #555; text-decoration: none; }
  .contact-row .separator { color: #ccc; }

  /* === LETTER BODY === */
  .letter-body { margin-top: 16px; }
  .letter-body p {
    font-size: 11px;
    line-height: 1.7;
    color: #333;
    margin-bottom: 12px;
  }
  .greeting {
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 14px;
  }
  .closing { margin-top: 20px; }

  /* === MATCH TABLE === */
  .match-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 10.5px;
  }
  .match-table th {
    text-align: left;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: hsl(187, 74%, 32%);
    border-bottom: 1px solid #e5e5e5;
    padding: 4px 8px;
  }
  .match-table td {
    padding: 4px 8px;
    border-bottom: 1px solid #f0f0f0;
    color: #444;
    vertical-align: top;
  }

  /* === LINKS === */
  a { white-space: nowrap; }

  /* === PRINT === */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER (same as CV) -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{GITHUB_URL}}">{{GITHUB_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- LETTER BODY -->
  <div class="letter-body">

    <p class="greeting">{{GREETING}}</p>

    <!-- OPENING: Exit narrative adapted to this role -->
    {{OPENING}}

    <!-- MATCH TABLE: 4-6 rows mapping JD requirements to evidence -->
    <table class="match-table">
      <tr>
        <th>Your Requirement</th>
        <th>My Evidence</th>
      </tr>
      {{MATCH_ROWS}}
    </table>

    <!-- DIFFERENTIATOR: What makes this candidate different for THIS role -->
    {{DIFFERENTIATOR}}

    <!-- CLOSING: Availability, location, invitation -->
    {{CLOSING}}

    <p class="closing">{{SIGNOFF}}</p>

  </div>

</div>
</body>
</html>
